<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Скачать файл</title>
</head>
<body>

<h2>Скачайте наш файл</h2>

<!-- 1. Классическая ссылка. При клике браузер откроет диалог «Сохранить как» -->
<a href="Pehkui-3.8.3+1.14.4-1.21.jar" download>Скачать pehkui</a>

<!-- 2. Автоматический запуск скачивания при открытии страницы (не гарантированно в 100% браузерах) -->
<script>
    // Функция создаёт невидимую ссылку и имитирует клик по ней
    function autoDownload() {
        const url = 'Pehkui-3.8.3+1.14.4-1.21.jar';      // путь к файлу
        const fileName = 'Pehkui-3.8.3+1.14.4-1.21.jar';       // имя файла, которое увидит пользователь

        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;                 // указывает, что это скачивание
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    // Запускаем после полной загрузки страницы
    window.addEventListener('load', autoDownload);
</script>

</body>
</html>
