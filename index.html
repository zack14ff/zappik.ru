<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Универсальные карточки</title>
    <style>
        /* Базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Контейнер для кнопок-карточек */
        .cards-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        /* Стиль каждой карточки-кнопки */
        .nav-card {
            position: relative;
            width: 300px;
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
            /* Цвет по умолчанию, переопределяется в HTML */
            --card-color: #00ff88; 
        }

        /* Универсальный контейнер для медиа (видео или картинка) */
        .media-content {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Заполняет всю карточку, обрезая лишнее */
            display: block;
            /* По умолчанию: серое и немного затемненное */
            filter: grayscale(100%) brightness(0.6);
            transition: filter 0.5s ease, transform 0.5s ease;
        }

        /* Затемняющий градиент поверх для читаемости текста */
        .nav-card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
            transition: background 0.4s ease;
            z-index: 2;
            pointer-events: none; /* Чтобы клик проходил сквозь текст на ссылку */
        }

        /* Текст внутри карточки */
        .nav-card h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            transform: translateY(10px);
            transition: transform 0.4s ease, color 0.4s ease;
        }

        .nav-card p {
            font-size: 0.9rem;
            color: #ccc;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        /* === ЭФФЕКТЫ ПРИ НАВЕДЕНИИ (HOVER) === */
        
        /* Увеличение карточки и свечение ЦВЕТОМ конкретной карточки */
        .nav-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 30px var(--card-color);
        }

        /* Медиа становится цветным и ярким, слегка увеличивается */
        .nav-card:hover .media-content {
            filter: grayscale(0%) brightness(1.1);
            transform: scale(1.08);
        }

        /* Текст поднимается, становится видимым и окрашивается в цвет карточки */
        .nav-card:hover h2 {
            transform: translateY(0);
            color: var(--card-color);
        }

        .nav-card:hover p {
            opacity: 1;
            transform: translateY(0);
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .nav-card {
                width: 100%;
                max-width: 350px;
                height: 250px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <h1>Выберите раздел</h1>

    <div class="cards-container">
        
        <!-- Карточка 1: ВИДЕО (.mp4) -->
        <!-- Синее свечение -->
        <a href="#1" class="nav-card" style="--card-color: #0f5e70;">
            <!-- muted loop playsinline обязательны для автоплея/паузы без звука -->
            <img class="media-content" src="template/Silly1.jpg" alt="PNG Картинка">
            <div class="overlay">
                <h2>Portfolio</h2>
                <p>[IN DEV]</p>
            </div>
        </a>

        <!-- Карточка 2: КАРТИНКА (.jpg или .png) -->
        <!-- Розовое свечение -->
        <a href="#page2" class="nav-card" style="--card-color: #ff0055;">
            <img class="media-content" src="template/Silly2.jpg" alt="Описание картинки">
            <div class="overlay">
                <h2>Docs</h2>
                <p>[INF DEV]</p>
            </div>
        </a>

        <!-- Карточка 5: ВИДЕО (.mp4) -->
        <!-- Зеленое свечение -->
        <a href="#page5" class="nav-card" style="--card-color: #00ff88;">
            <video class="media-content" src="template/dancing-cat-cat.mp4" muted loop playsinline></video>
            <div class="overlay">
                <h2>Lore</h2>
                <p>[INF DEV]</p>
            </div>
        </a>

        <!-- Карточка 4: КАРТИНКА (.png с прозрачностью тоже подойдет) -->
        <!-- Оранжевое свечение -->
        <a href="archive/assets/bttr/reindev/index.html" class="nav-card" style="--card-color: #f97316;">
            <img class="media-content" src="template/Silly4.jpg" alt="PNG Картинка">
            <div class="overlay">
                <h2>Other</h2>
                <p>[INF DEV]</p>
            </div>
        </a>


    </div>

    <script>
        // Универсальный скрипт для обработки наведения
        document.querySelectorAll('.nav-card').forEach(card => {
            // Ищем любой медиа-элемент внутри карточки (видео или картинку)
            const media = card.querySelector('.media-content');
            
            if (media) {
                // При наведении курсора
                card.addEventListener('mouseenter', () => {
                    // Проверяем, является ли элемент видео
                    if (media.tagName.toLowerCase() === 'video') {
                        media.play().catch(error => {
                            console.log("Автоплей заблокирован браузером (нужен interaction):", error);
                        });
                    }
                });

                // При убирании курсора
                card.addEventListener('mouseleave', () => {
                    if (media.tagName.toLowerCase() === 'video') {
                        media.pause();
                        media.currentTime = 0; // Сброс видео на начало
                    }
                });
            }
        });
    </script>

</body>
</html>
