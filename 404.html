<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - System Error</title>
    <style>
        /* Сброс стилей и базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #0F0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Холст для матричного дождя */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Контейнер с контентом */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #0F0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 20px rgba(0, 255, 0, 0.1);
            backdrop-filter: blur(2px);
            max-width: 600px;
            width: 90%;
        }

        /* Глитч-эффект для 404 */
        .glitch {
            font-size: 120px;
            font-weight: bold;
            position: relative;
            color: #0F0;
            text-shadow: 0 0 10px #0F0, 0 0 20px #0F0, 0 0 40px #0F0;
            animation: flicker 3s infinite;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #f00;
            clip-path: inset(0 0 0 0);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00f;
            clip-path: inset(0 0 0 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .message {
            font-size: 24px;
            margin: 20px 0 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .sub-message {
            font-size: 14px;
            color: #0a0;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Стильная кнопка */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #0F0;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid #0F0;
            background: transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #0F0;
            transition: left 0.3s ease;
            z-index: -1;
        }

        .btn:hover {
            color: #000;
            box-shadow: 0 0 20px #0F0;
        }

        .btn:hover::before {
            left: 0;
        }

        /* Эффект сканлайнов (полосы как на старом мониторе) */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Анимации */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.4; }
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(80% 0 5% 0); }
            40% { clip-path: inset(30% 0 20% 0); }
            60% { clip-path: inset(10% 0 80% 0); }
            80% { clip-path: inset(50% 0 30% 0); }
            100% { clip-path: inset(70% 0 10% 0); }
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .glitch { font-size: 80px; }
            .message { font-size: 18px; }
            .sub-message { font-size: 12px; }
            .btn { padding: 10px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <!-- Эффект старого монитора -->
    <div class="scanlines"></div>

    <!-- Холст для матрицы -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Основной контент -->
    <div class="content">
        <h1 class="glitch" data-text="404">404</h1>
        <p class="message">System Error: Page Not Found</p>
        <p class="sub-message">
            > TRACE ROUTE FAILED<br>
            > The resource you are looking for has been removed, had its name changed, or is temporarily unavailable.<br>
            > Initiate return sequence?
        </p>
        <a href="index.html" class="btn">Return to Mainframe</a>
    </div>

    <script>
        // Настройка матричного дождя
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // Установка размеров холста
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Символы: катакана + латиница + цифры (как в оригинальном фильме)
        const katakana = 'ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        // Массив для отслеживания Y-координаты каждой колонки
        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        // Функция отрисовки
        const draw = () => {
            // Полупрозрачный черный прямоугольник для эффекта затухания следа
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; // Зеленый цвет текста
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                // Случайный символ
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                
                // Отрисовка символа
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Сброс капли наверх случайным образом после того, как она пересекла экран
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                // Увеличение Y-координаты
                drops[i]++;
            }
        };

        // Запуск анимации (30-40 мс дает оптимальную скорость)
        setInterval(draw, 35);

        // Адаптация при изменении размера окна
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Пересчет колонок при ресайзе
            const newColumns = canvas.width / fontSize;
            // Заполняем новые колонки, если экран стал шире
            for (let x = drops.length; x < newColumns; x++) {
                drops[x] = 1;
            }
        });
    </script>
</body>
</html>
